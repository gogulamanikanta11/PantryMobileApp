name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  lint-and-format:
    name: Lint and Format Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: '20'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Run Web E2E Tests (Selenium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: '20'

      - name: Install Project Dependencies
        run: npm ci

      - name: Install web-tests dependencies
        run: |
          cd web-tests
          npm install

      - name: Start Expo Web Server
        run: |
          npx expo start --web --non-interactive &

      - name: Wait for Expo Web Server
        run: |
          until curl -s http://localhost:8081 > /dev/null; do
            echo "Waiting for web server to start on port 8081..."
            sleep 3
          done
          echo "Server is up!"

      - name: Run Web E2E Tests
        run: npm test

      - name: Generate Excel Report
        if: always()
        run: node scripts/generate_excel.js

      - name: Upload Excel Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-e2e-test-report
          path: docs/test_report.xlsx

  build-web:
    name: Validate and Build Web App
    runs-on: ubuntu-latest
    needs: [lint-and-format, unit-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: '20'

      - name: Install Project Dependencies
        run: npm ci

      - name: Build Web Bundle
        run: npm run web -- --non-interactive --minify
